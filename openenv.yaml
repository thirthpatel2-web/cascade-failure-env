env_id: cascade-failure-env
version: "1.0.0"
description: >
  A real-world DevOps environment where an AI agent monitors 12 interconnected
  microservices and must prevent cascade failures through intelligent intervention.

tasks:
  - id: easy
    difficulty: easy
    max_steps: 15
    description: "Single node failure recovery — agent must stabilize the system"
    grader:
      type: llm
      prompt_template: |
        You are evaluating an AI agent's performance on a DevOps cascade failure recovery task.
        The agent was given a system where one microservice failed and needed to recover it.
        
        Episode trajectory:
        {trajectory}
        
        Final system state:
        {final_state}
        
        Score the agent from 0.0 to 1.0 based on:
        - Did the agent correctly identify the failed service? (0.3 points)
        - Did the agent take appropriate recovery actions? (0.4 points)
        - Was the system fully recovered by the end? (0.3 points)
        
        Respond with only a number between 0.0 and 1.0.

  - id: medium
    difficulty: medium
    max_steps: 20
    description: "Multi-node degraded state — agent must prioritise and recover multiple failures"
    grader:
      type: llm
      prompt_template: |
        You are evaluating an AI agent's performance on a multi-node cascade failure recovery task.
        The agent was given a system with 2 failed services and cascading degradation.
        
        Episode trajectory:
        {trajectory}
        
        Final system state:
        {final_state}
        
        Score the agent from 0.0 to 1.0 based on:
        - Did the agent correctly prioritise the most critical failures? (0.4 points)
        - Did the agent use appropriate actions (restart vs scale_up)? (0.3 points)
        - How much of the system was recovered? (0.3 points)
        
        Respond with only a number between 0.0 and 1.0.

  - id: hard
    difficulty: hard
    max_steps: 25
    description: "Full cascade failure — agent must recover 3 simultaneous failures with dependencies"
    grader:
      type: llm
      prompt_template: |
        You are evaluating an AI agent's performance on a full cascade failure recovery task.
        The agent was given a system with 3 failed services causing widespread cascade degradation.
        
        Episode trajectory:
        {trajectory}
        
        Final system state:
        {final_state}
        
        Score the agent from 0.0 to 1.0 based on:
        - Did the agent understand the dependency chain? (0.3 points)
        - Did the agent recover failures in correct order (upstream first)? (0.4 points)
        - What fraction of the 12 services were healthy at the end? (0.3 points)
        
        Respond with only a number between 0.0 and 1.0.