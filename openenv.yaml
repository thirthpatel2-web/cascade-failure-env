name: cascade_failure_prevention
version: "1.0"
description: >
  An AI agent monitors a 12-node distributed microservice system and must
  detect, diagnose, and recover cascading failures before the system collapses.

environment:
  module: environment.env
  class: CascadeEnv

tasks:
  - name: easy
    description: Single node failure recovery within 10 steps
    grader: tasks.task_easy.run_task
    difficulty: easy

  - name: medium
    description: Multi-node degraded state requiring prioritized recovery
    grader: tasks.task_medium.run_task
    difficulty: medium

  - name: hard
    description: Full cascade failure requiring multi-step sequential recovery
    grader: tasks.task_hard.run_task
    difficulty: hard

observation_space:
  type: dict
  fields:
    nodes:
      type: dict
      description: Map of service name to health status (healthy/warning/critical/failed)
    metrics:
      type: dict
      description: System metrics including cpu, memory, error_rate
    logs:
      type: list
      description: Recent system log entries

action_space:
  type: dict
  fields:
    action:
      type: string
      values: [restart_service, scale_up, do_nothing]
    target:
      type: string
      description: Name of the service node to act on

reward:
  type: float
  range: [0.0, 1.0]
  description: >
    Dense reward based on mean node health across all 12 services.
    Healthy=1.0, Warning=0.6, Critical=0.3, Failed=0.0.
    do_nothing during active failure penalized by -0.2.

metadata:
  domain: devops
  tags: [incident-response, cascade-failure, microservices, real-world]
  runtime:
    cpu: 2
    memory_gb: 8