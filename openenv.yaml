name: cascade-failure-env
description: >
  A real-world DevOps environment where an AI agent monitors interconnected
  microservices and must prevent cascade failures through intelligent intervention.
  Models genuine Site Reliability Engineering incident response.

version: "1.0.0"
tags:
  - openenv
  - devops
  - sre
  - cascade-failure

benchmark: devops_cascade

tasks:
  - name: easy
    description: "Recover system from a single random node failure. Agent has 15 steps."
    grader: tasks.task_easy.run_task
    expected_score_range: [0.0, 1.0]

  - name: medium
    description: "Handle partial degradation across multiple nodes. Agent has 20 steps."
    grader: tasks.task_medium.run_task
    expected_score_range: [0.0, 1.0]

  - name: hard
    description: "Full cascade recovery requiring multi-step planning. Agent has 25 steps."
    grader: tasks.task_hard.run_task
    expected_score_range: [0.0, 1.0]

environment:
  class: CascadeEnv
  module: environment.env
  entrypoint: app.py

  observation_space:
    nodes:
      type: dict
      description: "Map of service name to status (healthy|warning|critical|failed)"
    metrics:
      type: dict
      description: "System metrics: cpu, memory, error_rate"
    logs:
      type: list
      description: "Recent system log lines"
    failed_nodes:
      type: list
      description: "List of currently failed nodes"

  action_space:
    type: function_call
    actions:
      - name: restart_service
        description: "Restart a specific node (gradual recovery over steps)"
        args: [target_node]
      - name: scale_up
        description: "Scale up a node to reduce severity one level"
        args: [target_node]
      - name: do_nothing
        description: "No operation"
        args: []

  reward:
    type: float
    range: [0.0, 1.0]
    dense: true
    description: >
      Weighted average of node health scores. Penalizes do_nothing during failures.

baseline:
  script: inference.py
  env_vars:
    - API_BASE_URL
    - MODEL_NAME
    - API_KEY
  expected_runtime_minutes: 5

infrastructure:
  min_vcpu: 2
  min_memory_gb: 4
  port: 7860